<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de pedidos</title>
</head>
<body>  

    <h1>Sistema de pedidos</h1>
    <form>
        <label>Numero de pedido</label>
        <input type="number" placeholder="Tu Numero"><br><br>
        
        <label>Cliente</label>
        <input type="text" placeholder="Tu nombre"><br><br>

        <label>Direccion</label>
        <input type="text" placeholder="Tu Direccion"><br><br>

        <label>Estado</label><br>
        <select>
            <option>Pendiente</option>
            <option>En Camino</option>
            <option>Entregado</option>
        </select><br>
        
        <button>Agregar pedido</button>
    </form>

    <h2>Enzo Mantovani</h2>

    <ul>
        <li>Pedido #001 - Juan - Pendiente</li>
        <li>Pedido #002 - Maria - En camino</li>
        <li>Pedido #003 - Pedro - Entregado</li>
    </ul>

<button>Procesar pedidos</button>

</body>
</html>
